<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSEA Immigration Guidance Module — Prototype</title>
<style>
:root{
  --navy:#1B3A6B;
  --navy-dark:#11264A;
  --navy-light:#2A4D85;
  --gold:#C8922A;
  --gold-light:#F2DFB8;
  --teal:#1A7F8E;
  --teal-light:#E1F0F2;
  --green:#2E7D32;
  --green-light:#E8F5E9;
  --red:#B71C1C;
  --red-light:#FDEAEA;
  --terracotta:#B5572B;
  --terracotta-light:#FBEAE2;
  --ink:#1A1A1A;
  --ink-soft:#444444;
  --ink-faint:#717171;
  --paper:#F7F8FA;
  --line:#DEE3EA;
  --white:#FFFFFF;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 1px 3px rgba(20,30,50,0.08), 0 1px 2px rgba(20,30,50,0.06);
  --shadow-md:0 4px 14px rgba(20,30,50,0.10);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
body{font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-0.01em;}
p{margin:0 0 0.9em;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;}

/* ===== App Shell ===== */
#app{display:flex;min-height:100vh;}

/* Sidebar */
#sidebar{
  width:260px;flex-shrink:0;background:var(--navy);color:var(--white);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  overflow-y:auto;
}
.brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.12);}
.brand-tag{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--gold);font-weight:700;margin-bottom:4px;}
.brand-title{font-size:15px;font-weight:600;line-height:1.3;}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.07em;color:rgba(255,255,255,0.45);padding:18px 20px 8px;font-weight:700;}
.navlist{list-style:none;margin:0;padding:0 10px;}
.navitem{margin-bottom:3px;}
.navlink{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:10px 12px;border-radius:var(--radius-sm);border:none;background:transparent;
  color:rgba(255,255,255,0.82);font-size:13.5px;font-weight:500;transition:background .12s;
  position:relative;
}
.navlink:hover{background:rgba(255,255,255,0.08);color:#fff;}
.navlink.active{background:var(--gold);color:var(--navy-dark);font-weight:700;}
.navlink .num{
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;flex-shrink:0;background:rgba(255,255,255,0.15);color:#fff;
}
.navlink.active .num{background:var(--navy-dark);color:var(--gold);}
.navlink .badge{
  margin-left:auto;font-size:9px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);
}
.navlink.fully-built .badge{background:var(--teal);color:#fff;}
.subnav{list-style:none;margin:2px 0 6px 30px;padding:0;border-left:1px solid rgba(255,255,255,0.15);}
.subnavlink{
  display:block;padding:6px 0 6px 12px;font-size:12.5px;color:rgba(255,255,255,0.6);
  border:none;background:none;text-align:left;width:100%;
}
.subnavlink:hover{color:#fff;}
.subnavlink.active{color:var(--gold);font-weight:600;}
.sidebar-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,0.12);font-size:11.5px;color:rgba(255,255,255,0.45);}

/* Main column */
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{
  background:var(--white);border-bottom:1px solid var(--line);padding:14px 32px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;
}
.breadcrumb{font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.breadcrumb b{color:var(--ink);font-weight:600;}
.breadcrumb .sep{color:var(--line);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.proto-pill{
  font-size:10.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
  padding:5px 10px;border-radius:20px;
}
.proto-pill.vertical{background:var(--teal-light);color:var(--teal);}
.proto-pill.horizontal{background:#F1EFE8;color:#5F5E5A;}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--gold-light);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

#content{flex:1;padding:32px;max-width:980px;width:100%;margin:0 auto;}

/* ===== Reusable UI ===== */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;}
.card + .card{margin-top:16px;}
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--teal);margin-bottom:6px;}
.page-title{font-size:24px;margin-bottom:6px;}
.page-sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:24px;}

.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius-sm);
  border:1px solid var(--line);background:var(--white);font-size:13.5px;font-weight:600;color:var(--ink);
  transition:all .12s;
}
.btn:hover{border-color:var(--navy);background:var(--paper);}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-primary:hover{background:var(--navy-dark);border-color:var(--navy-dark);}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.btn-gold:hover{background:#B07F22;border-color:#B07F22;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}

.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.module-card{
  background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:20px;
  display:flex;flex-direction:column;gap:10px;position:relative;transition:box-shadow .15s, transform .15s;cursor:pointer;
}
.module-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.module-card .mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.mc-icon{
  width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0;
}
.mc-status{font-size:9.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.mc-status.built{background:var(--teal-light);color:var(--teal);}
.mc-status.preview{background:#F1EFE8;color:#6B6A63;}
.mc-title{font-size:15.5px;font-weight:700;}
.mc-desc{font-size:13px;color:var(--ink-soft);line-height:1.5;flex:1;}
.mc-progress-track{height:5px;background:var(--paper);border-radius:4px;overflow:hidden;margin-top:2px;}
.mc-progress-fill{height:100%;background:var(--teal);border-radius:4px;}

.notice{
  display:flex;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid;font-size:13px;line-height:1.5;
}
.notice.info{background:var(--teal-light);border-color:#BEE0E5;color:#0E4A53;}
.notice.preview{background:#FAF8F2;border-color:#EADFC4;color:#6B5418;}
.notice-icon{flex-shrink:0;font-size:16px;}

/* Gagne / instructional tag */
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:3px 9px;border-radius:5px;background:var(--navy);color:#fff;margin-bottom:14px;}

/* scenario box */
.scenario-box{
  background:#FDF6EA;border:1px solid var(--gold-light);border-radius:var(--radius-sm);
  padding:18px 20px;margin-bottom:20px;font-size:14px;
}
.scenario-box b{color:var(--navy);}

/* choice list */
.choice{
  display:block;width:100%;text-align:left;padding:13px 16px;margin-bottom:9px;
  border:1.5px solid var(--line);border-radius:var(--radius-sm);background:var(--white);
  font-size:13.8px;color:var(--ink);transition:all .12s;
}
.choice:hover:not(:disabled){border-color:var(--navy-light);background:var(--paper);}
.choice .letter{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--paper);border:1px solid var(--line);align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-right:10px;}
.choice:disabled{cursor:default;}
.choice.correct{background:var(--green-light);border-color:var(--green);}
.choice.correct .letter{background:var(--green);color:#fff;border-color:var(--green);}
.choice.incorrect{background:var(--red-light);border-color:var(--red);}
.choice.incorrect .letter{background:var(--red);color:#fff;border-color:var(--red);}
.choice.dim{opacity:0.5;}

/* feedback panel */
.feedback-panel{margin-top:18px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--line);animation:slideIn .25s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.feedback-head{padding:12px 18px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px;}
.feedback-head.correct{background:var(--green);color:#fff;}
.feedback-head.incorrect{background:var(--terracotta);color:#fff;}
.feedback-body{padding:16px 18px;background:#fff;font-size:13.5px;color:var(--ink-soft);}
.feedback-body p:last-child{margin-bottom:0;}

/* progress bar top of content */
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.progress-track{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .3s ease;}
.progress-label{font-size:11.5px;color:var(--ink-faint);white-space:nowrap;font-weight:600;}

/* step nav pills (section 2 sub pages) */
.steps{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.step-pill{
  font-size:11.5px;padding:6px 11px;border-radius:20px;background:var(--paper);border:1px solid var(--line);
  color:var(--ink-faint);font-weight:600;cursor:pointer;
}
.step-pill.done{background:var(--teal-light);color:var(--teal);border-color:#BEE0E5;}
.step-pill.current{background:var(--navy);color:#fff;border-color:var(--navy);}

/* todo/dos donts */
.dual-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:680px){.dual-col{grid-template-columns:1fr;}}
.col-card{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--line);}
.col-head{padding:10px 16px;font-weight:700;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;}
.col-head.do{background:var(--green);}
.col-head.dont{background:var(--red);}
.col-body{padding:14px 16px;background:#fff;}
.col-body ul{margin:0;padding-left:18px;font-size:13px;color:var(--ink-soft);line-height:1.7;}

/* role cards */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px;}
@media(max-width:680px){.role-grid{grid-template-columns:1fr;}}
.role-card{border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;}
.role-head{background:var(--teal);color:#fff;padding:9px 14px;font-size:12.5px;font-weight:700;}
.role-body{padding:13px 14px;font-size:12.8px;color:var(--ink-soft);background:#fff;}

/* steps numbered */
.proto-step{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
.proto-step:last-child{border-bottom:none;}
.proto-step-num{width:26px;height:26px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.proto-step-title{font-weight:700;font-size:13.8px;margin-bottom:2px;}
.proto-step-desc{font-size:13px;color:var(--ink-soft);}

/* faq accordion */
.faq-item{border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
.faq-q{
  width:100%;text-align:left;padding:13px 16px;background:#fff;border:none;font-size:13.6px;font-weight:600;
  display:flex;justify-content:space-between;align-items:center;color:var(--navy);
}
.faq-q .chev{transition:transform .2s;color:var(--ink-faint);font-size:11px;}
.faq-q.open .chev{transform:rotate(180deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .25s ease;background:var(--paper);}
.faq-a-inner{padding:0 16px 14px;font-size:13px;color:var(--ink-soft);}

/* job aid card */
.jobaid{
  display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius-sm);
  margin-bottom:10px;background:#fff;
}
.jobaid-icon{width:38px;height:38px;border-radius:8px;background:var(--gold-light);color:#9A6A1B;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.jobaid-title{font-weight:700;font-size:13.5px;}
.jobaid-desc{font-size:12px;color:var(--ink-faint);}
.jobaid-dl{margin-left:auto;}

/* reflection textareas */
.reflect-q{font-weight:600;font-size:13.6px;margin-bottom:8px;color:var(--navy);}
textarea.reflect-input{
  width:100%;min-height:64px;border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;
  font-family:inherit;font-size:13.3px;resize:vertical;background:var(--paper);
}
textarea.reflect-input:focus{outline:none;border-color:var(--navy-light);background:#fff;}
.char-count{font-size:11px;color:var(--ink-faint);text-align:right;margin-top:4px;}

/* poll */
.poll-row{margin-bottom:16px;}
.poll-q{font-size:13.5px;font-weight:600;margin-bottom:8px;}
.poll-scale{display:flex;gap:6px;}
.poll-opt{flex:1;text-align:center;padding:8px 4px;border:1px solid var(--line);border-radius:var(--radius-sm);font-size:10.8px;color:var(--ink-faint);background:#fff;font-weight:600;}
.poll-opt.selected{background:var(--navy);color:#fff;border-color:var(--navy);}

/* knowledge check */
.kc-item{border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;background:#fff;}
.kc-num{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--teal-light);color:var(--teal);align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-right:8px;}
.kc-q{font-weight:600;font-size:13.6px;margin-bottom:10px;display:inline;}
.kc-opts{margin-left:30px;}
.kc-opt{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;cursor:pointer;
  border:1px solid transparent;
}
.kc-opt:hover{background:var(--paper);}
.kc-opt input{accent-color:var(--navy);}
.kc-result{margin-top:10px;margin-left:30px;font-size:12.5px;font-weight:600;padding:8px 10px;border-radius:6px;display:none;}
.kc-result.show{display:block;}
.kc-result.right{background:var(--green-light);color:var(--green);}
.kc-result.wrong{background:var(--red-light);color:var(--red);}

.score-banner{
  display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-radius:var(--radius-sm);
  background:var(--navy);color:#fff;margin-bottom:20px;
}
.score-num{font-size:26px;font-weight:700;}
.score-label{font-size:11.5px;text-transform:uppercase;letter-spacing:0.05em;color:rgba(255,255,255,0.65);font-weight:700;}

/* lightbox-ish disabled overlay used in horizontal-only screens */
.locked-overlay{
  position:relative;
}
.locked-tag{
  position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  background:rgba(27,58,107,0.92);color:#fff;padding:4px 9px;border-radius:5px;
}

footer.proto-footer{padding:20px 32px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-faint);text-align:center;}

@media(max-width:860px){
  #sidebar{position:fixed;left:-280px;z-index:50;transition:left .2s;box-shadow:var(--shadow-md);}
  #sidebar.open{left:0;}
  #content{padding:20px;}
  .role-grid,.dual-col{grid-template-columns:1fr;}
}
.menu-toggle{display:none;background:none;border:none;font-size:20px;color:var(--navy);}
@media(max-width:860px){.menu-toggle{display:block;}}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar"></nav>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i>&#9776;</i></button>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="topbar-right">
        <span class="proto-pill" id="protoPill"></span>
        <div class="user-chip"><div class="avatar">KM</div><span>Learner Preview</span></div>
      </div>
    </div>
    <div id="content"></div>
    <footer class="proto-footer">MSEA Immigration Guidance Module — Interactive Prototype · Built for instructional design review, not for public release</footer>
  </div>
</div>
<script>
/* ============================================================
   HORIZONTAL LAYER
   Course Home + non-functional module overview screens
   ============================================================ */

function colorBg(c){
  const map = { purple:"#EEEDFE", teal:"#E1F5EE", coral:"#FAECE7", pink:"#FBEAF0", amber:"#FAEEDA" };
  return map[c] || "#F1EFE8";
}
function colorFg(c){
  const map = { purple:"#534AB7", teal:"#0F6E56", coral:"#993C1D", pink:"#993556", amber:"#854F0B" };
  return map[c] || "#5F5E5A";
}

function renderHome() {
  return `
    <div class="eyebrow">Course Home</div>
    <h1 class="page-title">Introduction to MSDE Immigration Guidance</h1>
    <p class="page-sub">A self-paced, nonlinear learning experience for MSEA staff, educators, and school-based personnel. Complete sections in any order based on your immediate workplace need.</p>

    <div class="notice info" style="margin-bottom:24px;">
      <span class="notice-icon">ℹ</span>
      <div>
        <b>About this prototype:</b> Section 2 (School &amp; District Protocols) is fully built and interactive — try the branching scenarios, knowledge check, and reflection activities. Sections 1, 3, 4, and 5 are shown as horizontal previews: the screen layout and content outline are visible, but the activities are not yet functional. This mirrors a real SAM-cycle prototype, where one vertical slice is built deep for user testing while the rest of the course is sketched in breadth.
      </div>
    </div>

    <h3 style="font-size:15px;margin-bottom:14px;">Module Progress</h3>
    <div class="module-grid">
      ${MODULES.map(m => `
        <div class="module-card" onclick="go('${m.built?'section2':'section'+m.id}'${m.built?",'overview'":''})">
          <div class="mc-top">
            <div class="mc-icon" style="background:${colorBg(m.color)};color:${colorFg(m.color)};">${m.icon}</div>
            <span class="mc-status ${m.built?'built':'preview'}">${m.built ? 'Fully built' : 'Preview only'}</span>
          </div>
          <div class="mc-title">Module ${m.id}: ${m.title}</div>
          <div class="mc-desc">${m.desc}</div>
          <div class="mc-progress-track"><div class="mc-progress-fill" style="width:${m.built ? '0' : '0'}%;background:${m.built?'var(--teal)':'#D3D1C7'};"></div></div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderPreviewModule(id) {
  const m = MODULES.find(x=>x.id===id);
  const outlines = {
    1: [
      "Understanding Student Rights and Educational Access",
      "Student Privacy and Confidentiality",
      "Creating a Common Vocabulary",
      "Recognizing Student Concerns and Fear",
      "Application Activities and Scenarios",
    ],
    3: [
      "Educator Responsibilities and Professional Boundaries",
      "Trauma-Informed and Culturally Responsive Responses",
      "Communication Strategies for Sensitive Situations",
      "Role-Based Workplace Applications",
      "Application Activities and Scenarios",
    ],
    4: [
      "Understanding Available Supports",
      "Connecting Families to Appropriate Resources",
      "Reducing Fear and Building Confidence for Families",
      "Resource Navigation Tools",
      "Application Activities and Scenarios",
    ],
    5: [
      "Understanding School Climate and Belonging",
      "Recognizing Bullying, Harassment, and Discrimination",
      "Appropriate Intervention Strategies",
      "Supporting Union Members, Students, and Families",
      "Application Activities and Scenarios",
    ],
  };
  const objectives = {
    1: ["Identify student rights and protections related to immigration status.", "Recognize confidentiality expectations regarding student records.", "Distinguish between myths and facts about immigrant student access to education."],
    3: ["Identify educator responsibilities when supporting immigrant students and families.", "Determine appropriate communication strategies for sensitive situations.", "Demonstrate trauma-informed, culturally responsive educator responses."],
    4: ["Identify school, district, state, and community resources for immigrant families.", "Determine when and how to refer families to appropriate supports.", "Identify communication approaches that reduce fear and confusion."],
    5: ["Identify behaviors that contribute to exclusion or bullying related to immigration concerns.", "Determine appropriate intervention strategies during incidents.", "Apply strategies that foster safe, affirming school environments."],
  };

  return `
    <div class="eyebrow">Module ${m.id} · Horizontal preview</div>
    <h1 class="page-title">${m.title}</h1>
    <p class="page-sub">${m.desc}</p>

    <div class="notice preview" style="margin-bottom:22px;">
      <span class="notice-icon">◐</span>

function renderSection2() {

    case "prior": body = sec2Prior(); break;
    case "responsibilities": body = sec2Responsibilities(); break;

  sec2sub: "overview",
  scenario1: { answered:false, choice:null },
  scenario2: { answered:false, choice:null },
  kcAnswers: {},
  reflections: {},
  pollAnswers: {},
  sec2Progress: 0, // 0-100, computed
  visitedSec2Steps: new Set(["overview"]),
};

const SEC2_STEPS = [
  { id:"overview", label:"Overview" },
  { id:"objectives", label:"Objectives" },
  { id:"prior", label:"Prior Knowledge" },
  { id:"responsibilities", label:"Responsibilities" },
  { id:"dosdonts", label:"Do's & Don'ts" },
  { id:"escalation", label:"Escalation Steps" },
  { id:"faq", label:"FAQ" },
  { id:"scenario1", label:"Scenario 1" },
  { id:"scenario2", label:"Scenario 2" },
  { id:"reflection", label:"Reflection" },
  { id:"assessment", label:"Knowledge Check" },
  { id:"summary", label:"Summary" },
];

const MODULES = [
  { id:1, title:"Student Rights & Legal Protections", desc:"Student protections, confidentiality expectations, and myths vs. facts about immigrant student access to education.", built:false, icon:"01", color:"purple" },
  { id:2, title:"School & District Protocols for Immigration Enforcement", desc:"Step-by-step escalation procedures, staff roles, and realistic decision-making scenarios.", built:true, icon:"02", color:"teal" },
  { id:3, title:"Educator & School Staff Guidance", desc:"Trauma-informed communication, professional boundaries, and role-based workplace applications.", built:false, icon:"03", color:"coral" },
  { id:4, title:"Resources for Families", desc:"School, district, state, and community resources, plus referral practices that build trust.", built:false, icon:"04", color:"pink" },
  { id:5, title:"Bullying Prevention & School Climate", desc:"Recognizing exclusion and discrimination, and intervention strategies that foster belonging.", built:false, icon:"05", color:"amber" },
];

function go(route, sub) {
  STATE.route = route;
  if (sub) STATE.sec2sub = sub;
  if (route === "section2" && sub) STATE.visitedSec2Steps.add(sub);
  render();
  window.scrollTo({top:0, behavior:"instant"});
}

function renderSidebar() {
  const sb = document.getElementById("sidebar");
  let html = `
    <div class="brand">
      <div class="brand-tag">MSEA Professional Learning</div>
      <div class="brand-title">Immigration Guidance for Staff &amp; Educators</div>
    </div>
    <div class="nav-section-label">Course</div>
    <ul class="navlist">
      <li class="navitem">
        <button class="navlink ${STATE.route==='home'?'active':''}" onclick="go('home')">
          <span class="num">⌂</span> Course Home
        </button>
      </li>
    </ul>
    <div class="nav-section-label">Modules</div>
    <ul class="navlist">
  `;
  const shortTitles = {1:"Student Rights", 2:"School & District Protocols", 3:"Educator Guidance", 4:"Family Resources", 5:"Bullying Prevention"};
  MODULES.forEach(m => {
    const isActive = (STATE.route === "section"+m.id) || (STATE.route==="section2" && m.id===2);
    html += `<li class="navitem">
      <button class="navlink ${isActive?'active':''} ${m.built?'fully-built':''}" onclick="go('${m.built ? 'section2' : 'section'+m.id}'${m.built?",'overview'":''})">
        <span class="num">${m.id}</span> ${shortTitles[m.id]}
        <span class="badge">${m.built ? 'Built' : 'Preview'}</span>
      </button>
      ${ (STATE.route==='section2' && m.id===2) ? renderSec2SubNav() : "" }
    </li>`;
  });
  html += `</ul>
    <div class="sidebar-foot">
      Prototype v1 · SAM iteration 1<br>Built ${new Date().getFullYear()} for design review
    </div>
  `;
  sb.innerHTML = html;
}

function renderSec2SubNav() {
  let html = `<ul class="subnav">`;
  SEC2_STEPS.forEach(s => {
    html += `<li><button class="subnavlink ${STATE.sec2sub===s.id?'active':''}" onclick="go('section2','${s.id}')">${s.label}</button></li>`;
  });
  html += `</ul>`;
  return html;
}

function renderTopbar() {
  const bc = document.getElementById("breadcrumb");
  const pill = document.getElementById("protoPill");
  let crumbs = ["MSEA Immigration Guidance"];
  if (STATE.route === "home") {
    crumbs.push("Course Home");
    pill.textContent = "Horizontal preview";
    pill.className = "proto-pill horizontal";
  } else if (STATE.route === "section2") {
    const stepLabel = SEC2_STEPS.find(s=>s.id===STATE.sec2sub)?.label || "";
    crumbs.push("Section 2: School & District Protocols", stepLabel);
    pill.textContent = "Fully functional";
    pill.className = "proto-pill vertical";
  } else {
    const num = STATE.route.replace("section","");
    const mod = MODULES.find(m=>m.id==num);
    crumbs.push(mod ? mod.title : "Module");
    pill.textContent = "Horizontal preview";
    pill.className = "proto-pill horizontal";
  }
  bc.innerHTML = crumbs.map((c,i) => i===crumbs.length-1 ? `<b>${c}</b>` : `<span>${c}</span><span class="sep">/</span>`).join("");
}

function render() {
  renderSidebar();
  renderTopbar();
  const content = document.getElementById("content");
  if (STATE.route === "home") content.innerHTML = renderHome();
  else if (STATE.route === "section2") content.innerHTML = renderSection2();
  else content.innerHTML = renderPreviewModule(parseInt(STATE.route.replace("section","")));
  attachHandlers();
}

function attachHandlers() {
  // All interactions are wired via inline onclick handlers for simplicity in this prototype.
  // This function exists as an extension point if event delegation is needed later.
}

document.addEventListener("DOMContentLoaded", () => { go("home"); });

</script>
</body>
</html>
